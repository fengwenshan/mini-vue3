<!DOCTYPE html>
<html lang="zh-cn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Effect</title>
</head>
<body>
  <script type="module">
  // import { ref, reactive, isRef } from '../dist/reactivity.esm-browser.js'
  import { ref, isRef, reactive } from './vue.esm-browser.js'

  // 自动解包：ref作为reactive对象里面的属性会自动解包
  const count = ref(0)

  count.value = 2

  // 判断是否为ref对象
  const flag = isRef(count)
  console.log('Ref 基本类型：',flag)

  const state = reactive({ count })
  console.log('ref作为响应式对象的属性被访问：', state.count) // 2

  state.count = 1 
  console.log('ref作为响应式对象的属性修改后访问：', count.value) // 1

  // 非原始值 通过 reactive 转换为响应式代理
  const original = {
    name: 'why',
    age: 18,
    attrs: {
      parentName: 'zhangsan'
    }
  }
  const r1 = ref(original)
  const r2 = ref(r1)
  const r3 = ref({ a: 1 })
  console.log('ref创建值再次给ref创建：', r2.value)

  r1.value = r3
  console.log(r1.value)

</script>
</body>
</html>
